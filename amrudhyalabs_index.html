<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Amrudhya Labs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a08;
      --off-white: #f5f2eb;
      --gold: #c9a84c;
      --muted: #5a5a50;
      --border: rgba(201,168,76,0.15);
    }

    body {
      background: var(--black);
      color: var(--off-white);
      font-family: 'Cormorant Garamond', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.5;
    }

    body::after {
      content: '';
      position: fixed;
      top: -20%;
      right: -15%;
      width: 70vw;
      height: 70vw;
      max-width: 800px;
      max-height: 800px;
      border: 1px solid rgba(201,168,76,0.05);
      border-radius: 50%;
      pointer-events: none;
    }

    nav {
      padding: 36px 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      opacity: 0;
      animation: fade 1s ease forwards;
      animation-delay: 0.2s;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--off-white);
      text-decoration: none;
    }

    .logo span { color: var(--gold); }

    .nav-link {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.3s;
    }

    .nav-link:hover { color: var(--gold); }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px 60px 80px;
      max-width: 800px;
    }

    .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 40px;
      display: flex;
      align-items: center;
      gap: 14px;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards;
      animation-delay: 0.5s;
    }

    .eyebrow::before {
      content: '';
      width: 28px;
      height: 1px;
      background: var(--gold);
      flex-shrink: 0;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(48px, 6.5vw, 88px);
      line-height: 1.0;
      letter-spacing: -0.01em;
      opacity: 0;
      animation: fadeUp 1s ease forwards;
      animation-delay: 0.7s;
    }

    h1 em {
      font-style: italic;
      color: var(--gold);
    }

    .line {
      width: 48px;
      height: 1px;
      background: linear-gradient(90deg, var(--gold), transparent);
      margin: 44px 0;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards;
      animation-delay: 1s;
    }

    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: italic;
      font-size: clamp(18px, 2.2vw, 26px);
      line-height: 1.6;
      color: rgba(245,242,235,0.5);
      max-width: 520px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards;
      animation-delay: 1.1s;
    }

    .contact-wrap {
      margin-top: 64px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards;
      animation-delay: 1.3s;
    }

    .contact-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .contact-email {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 300;
      color: var(--off-white);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      padding-bottom: 4px;
      transition: color 0.3s, border-color 0.3s;
      letter-spacing: 0.04em;
    }

    .contact-email:hover {
      color: var(--gold);
      border-color: var(--gold);
    }

    footer {
      padding: 32px 60px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      opacity: 0;
      animation: fade 1s ease forwards;
      animation-delay: 1.6s;
    }

    .footer-copy {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.14em;
      color: var(--muted);
    }

    .footer-group {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.14em;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.3s;
    }

    .footer-group:hover { color: var(--gold); }

    @keyframes fade {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 640px) {
      nav { padding: 28px 28px; }
      main { padding: 40px 28px 60px; }
      footer { padding: 28px 28px; flex-direction: column; gap: 14px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="#" class="logo">Amrudhya <span>Labs</span></a>
    <a href="https://amrudhya.com" class="nav-link">Amrudhya Group</a>
  </nav>

  <main>
    <div class="eyebrow">In Development</div>
    <h1>Something<br>is being<br><em>built here.</em></h1>
    <div class="line"></div>

    <div class="contact-wrap">
      <div class="contact-label">Get in touch</div>
      <a href="mailto:info@amrudhya.com" class="contact-email">info@amrudhya.com</a>
    </div>
  </main>

  <footer>
    <span class="footer-copy">© 2026 Amrudhya Labs</span>
    <a href="https://amrudhya.com" class="footer-group">Part of Amrudhya Group →</a>
  </footer>

</body>
</html>
